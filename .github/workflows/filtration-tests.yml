name: Filtration Tests

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pyarrow faiss-cpu

      - name: Run filtration tests
        run: |
          python -m unittest discover -s scripts/tests/filtration_test -p "test_*.py" -v
